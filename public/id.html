<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="/manifest.json">
<title>Visitor Pass</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #0f172a; font-family: 'Google Sans', Roboto, sans-serif; color: #e2e8f0; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 20px 16px 40px; min-height: 100dvh; }

  .org-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .org-logo { width: 40px; height: 40px; background: #3b82f6; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .org-name { font-size: 15px; font-weight: 700; color: #e2e8f0; }
  .org-sub { font-size: 11px; color: #64748b; }

  .card { width: 100%; max-width: 360px; background: #1e293b; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.5); border: 1px solid #334155; }

  .card-header { background: linear-gradient(135deg, #1d4ed8, #3b82f6); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
  .card-header-title { font-size: 13px; font-weight: 700; color: #bfdbfe; text-transform: uppercase; letter-spacing: 1.5px; }
  .status-badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
  .status-pending   { background: #fbbf24; color: #1c1917; }
  .status-checked-in  { background: #22c55e; color: #fff; }
  .status-checked-out { background: #6b7280; color: #fff; }
  .status-expired   { background: #ef4444; color: #fff; }

  .card-body { padding: 20px; }
  .visitor-photo-wrap { display: flex; justify-content: center; margin-bottom: 16px; }
  .visitor-photo { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid #3b82f6; background: #334155; display: flex; align-items: center; justify-content: center; font-size: 36px; color: #94a3b8; overflow: hidden; }
  .visitor-photo img { width: 100%; height: 100%; object-fit: cover; }

  .visitor-name { text-align: center; font-size: 20px; font-weight: 700; color: #f1f5f9; margin-bottom: 4px; }
  .visitor-id-text { text-align: center; font-size: 12px; color: #64748b; font-family: monospace; margin-bottom: 16px; letter-spacing: 1px; }

  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .info-item { background: #0f172a; border-radius: 10px; padding: 10px 12px; }
  .info-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 3px; }
  .info-value { font-size: 13px; color: #e2e8f0; font-weight: 600; word-break: break-word; }

  .barcode-section { background: #fff; border-radius: 12px; padding: 12px 16px 8px; margin-bottom: 4px; }
  .barcode-canvas { width: 100%; height: 60px; }
  .barcode-text { text-align: center; font-size: 11px; color: #475569; font-family: monospace; margin-top: 4px; letter-spacing: 2px; }

  .validity { text-align: center; font-size: 11px; color: #64748b; margin-top: 12px; }
  .validity span { color: #f59e0b; font-weight: 600; }

  .expired-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; flex-direction: column; gap: 12px; padding: 24px; text-align: center; }
  .expired-overlay h2 { font-size: 22px; font-weight: 700; color: #ef4444; }
  .expired-overlay p { font-size: 14px; color: #94a3b8; }

  .timer { text-align: center; font-size: 12px; color: #475569; margin-top: 8px; }
  .timer span { color: #38bdf8; font-weight: 700; font-family: monospace; }
</style>
</head>
<body>

<div class="org-header">
  <div class="org-logo">🏢</div>
  <div>
    <div class="org-name">Visitor Management</div>
    <div class="org-sub">Secure Entry System</div>
  </div>
</div>

<div class="card">
  <div class="card-header">
    <div class="card-header-title">Visitor Pass</div>
    <div class="status-badge status-pending" id="statusBadge">Pending</div>
  </div>
  <div class="card-body">
    <div class="visitor-photo-wrap">
      <div class="visitor-photo" id="photoWrap">👤</div>
    </div>
    <div class="visitor-name" id="visitorName">—</div>
    <div class="visitor-id-text" id="visitorIdText">—</div>
    <div class="info-grid">
      <div class="info-item"><div class="info-label">Phone</div><div class="info-value" id="infoPhone">—</div></div>
      <div class="info-item"><div class="info-label">Purpose</div><div class="info-value" id="infoPurpose">—</div></div>
      <div class="info-item" style="grid-column:1/-1"><div class="info-label">Visiting</div><div class="info-value" id="infoVisiting">—</div></div>
    </div>
    <div class="barcode-section">
      <canvas id="barcodeCanvas" class="barcode-canvas"></canvas>
      <div class="barcode-text" id="barcodeText">—</div>
    </div>
    <div class="validity" id="validity"></div>
    <div class="timer" id="timerWrap">Expires in <span id="timerText">—</span></div>
  </div>
</div>

<!-- JsBarcode from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.6/JsBarcode.all.min.js"></script>
<script>
  const visitorId = new URLSearchParams(window.location.search).get('v');
  if (!visitorId) showError('No visitor ID provided.');

  const statusLabels = { 'pending': 'Pending', 'checked-in': 'Checked In', 'checked-out': 'Checked Out' };
  const statusClasses = { 'pending': 'status-pending', 'checked-in': 'status-checked-in', 'checked-out': 'status-checked-out' };

  function formatTime(ms) {
    const s = Math.floor(ms / 1000);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sc = s % 60;
    if (h > 0) return `${h}h ${m}m`;
    if (m > 0) return `${m}m ${sc}s`;
    return `${sc}s`;
  }

  function updateStatus(status) {
    const badge = document.getElementById('statusBadge');
    badge.textContent = statusLabels[status] || status;
    badge.className = 'status-badge ' + (statusClasses[status] || 'status-pending');
  }

  async function load() {
    let d;
    try {
      const res = await fetch('/api/visitor?v=' + visitorId);
      if (res.status === 404) { showError('Visitor pass not found.'); return; }
      if (res.status === 410) { showExpired(); return; }
      d = await res.json();
    } catch(e) { showError('Network error.'); return; }

    // Photo
    const photoWrap = document.getElementById('photoWrap');
    if (d.photoUrl) {
      photoWrap.innerHTML = `<img src="${d.photoUrl}" alt="Visitor" onerror="this.parentElement.innerHTML='👤'">`;
    }

    // Info
    document.getElementById('visitorName').textContent = d.name || '—';
    document.getElementById('visitorIdText').textContent = d.visitorId;
    document.getElementById('infoPhone').textContent = d.phone || '—';
    document.getElementById('infoPurpose').textContent = d.purpose || '—';
    document.getElementById('infoVisiting').textContent = d.visiting || '—';

    // Status
    updateStatus(d.status);

    // Barcode
    const canvas = document.getElementById('barcodeCanvas');
    JsBarcode(canvas, d.visitorId, {
      format: 'CODE128',
      lineColor: '#0f172a',
      background: '#ffffff',
      width: 2,
      height: 50,
      displayValue: false,
      margin: 0,
    });
    document.getElementById('barcodeText').textContent = d.visitorId;

    // Validity
    const issued = new Date(d.issuedAt).toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' });
    const expiry = new Date(d.expiry).toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' });
    document.getElementById('validity').innerHTML = `Issued: <span>${issued}</span> &nbsp;·&nbsp; Expires: <span>${expiry}</span>`;

    // Countdown timer
    function tick() {
      const remaining = d.expiry - Date.now();
      if (remaining <= 0) { showExpired(); return; }
      document.getElementById('timerText').textContent = formatTime(remaining);
    }
    tick();
    setInterval(tick, 1000);

    // Poll status every 10s
    setInterval(async () => {
      try {
        const r = await fetch('/api/visitor?v=' + visitorId);
        if (r.ok) { const u = await r.json(); updateStatus(u.status); }
      } catch {}
    }, 10000);
  }

  function showError(msg) {
    document.body.innerHTML = `<div class="expired-overlay"><h2>⚠️ Error</h2><p>${msg}</p></div>`;
  }
  function showExpired() {
    document.body.innerHTML = `<div class="expired-overlay"><h2>⏰ Pass Expired</h2><p>This visitor pass is no longer valid.</p><p style="margin-top:8px;font-size:12px;">Contact security to issue a new pass.</p></div>`;
  }

  load();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
</script>
</body>
</html>
